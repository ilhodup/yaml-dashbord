card_mod:
  style: |
    ha-card {
      border: 1px solid black;
      perspective: 1000px;
      will-change: transform, opacity;
      animation-timing-function: ease-in-out;
    }

    /* Optimisation GPU */
    ha-card * {
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }
    ha-state-icon {
      transform-origin: 50% 50%;

      {% if states('sensor.maxpv_puissance_active') | float(0) > 10 %}
        color: #2ecc71;
        animation: spin 1s linear infinite;
      {% else %}
        color: #9e9e9e;
        animation: none;
      {% endif %}
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes water-flow {
      from {
        transform: translate(-50%, -50%) rotate(0deg) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      to {
        transform: translate(-50%, -50%) rotate(0deg) translateY(70px);
        opacity: 0;
      }
      }
    @keyframes spinedf {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, 300%) rotate(0deg);
      }
      }
    @keyframes v2c {
      from {
        transform: translate(-50%, -50%) rotate(0deg) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      to {
        transform: translate(-50%, -50%) rotate(0deg) translateY(90px);
        opacity: 0;
      }
      }
    @keyframes charge-voiture {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes flowv2c {
          0% { background-position: 200% 0; }
          100% { background-position: 0 0; }
        }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
      }
    }
    @keyframes panneaux {
      from {
        transform: translate(-250%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotate(0deg);
      }
    }
    @keyframes panneaux2 {
      from {
        transform: translate(-50%, -50%) rotate(0deg) translateX(-70px);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      to {
        transform: translate(-50%, -50%) rotate(0deg) translateY(0px);
        opacity: 0.3;
      }
    }
    @keyframes panneaux3 {
      from {
        transform: translate(-50%, -50%) rotate(-32deg) translateX(-28px);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      to {
         transform: translate(-50%, -50%) rotate(-38deg) translateY(0px);
         opacity: 0; 
      }
      }
    @keyframes nuage {
      from {
        transform: translate(-50%, -50%) rotate(0deg) translateX(-170px);
        opacity: 0;
      }
      30% {
        opacity: 0.7;
      }
      to {
        transform: translate(-50%, -50%) rotate(0deg) translateY(0px);
        opacity: 0.5;
      }
      }
    @keyframes brouillard {
      from {
        transform: translate(-50%, -50%) rotate(0deg) translateX(-100px);
        opacity: 0.3;
      }
      50% {
        opacity: 0.4;
      }
      to {
        transform: translate(-50%, -50%) rotate(0deg) translateY(0px);
        opacity: 0.2;
      }
      }
    @keyframes pluie {
      from {
        transform: translate(-50%, -50%) rotate(0deg) translateX(0px);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      to {
        transform: translate(-50%, -50%) rotate(0deg) translateY(20px);
        opacity: 0.3;
      }
      }
    @keyframes fan {
      from {
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotateZ(360deg);
      }
      }
    @keyframes sinus {
      from {
        transform: translate(-50%, -50%) rotateZ(0deg);
      }
      to {
        transform: translate(-50%, -50%) rotateX(360deg);
      }
    }
    @keyframes hublo {
      from {
        transform: translate(-40%, -40%) rotate(0deg);
      }
      to {
        transform: translate(-40%, -40%) rotate(360deg);
      }
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 15px yellow; }
      50%  { box-shadow: 5px 0px 15px yellow; }
      100% { box-shadow: 0 0 15px yellow; }
    }
    @keyframes pulse2 {
      0% { transform: scale(1) rotate(-30deg); }
      50% { transform: scale(1.12) rotate(-30deg); }
      100% { transform: scale(1) rotate(-30deg); }
    }
    @keyframes pulse3 {
      0%   { box-shadow: 2px 2px 2px red; }
      50%  { box-shadow: 5px 5px 5px red; }
      100% { box-shadow: 2px 2px 2px red; }
    }
    @keyframes neige {
      0% {
        transform: translate(-50%, -50%) translateY(-50px);
        opacity: 1;
      }
      10% {
        opacity: 1;
      }
      90% {
       opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) translateY(20px);
        opacity: 1;
      }
    }
    @keyframes eclair {
      0%   { opacity: 0; }
      12.5% { opacity: 1; }   /* 1s sur 8s = 12.5% */
      25%  { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes eclaircie {
    0%   { left: 64%; }
    50%  { left: 56%; }
    100% { left: 64%; }
    }
    @keyframes nuitdegagee {
    0%   { left: 60%; top: 2%; }
    20%   { left: 89%; top: 6%; }
    40%  { left: 60%; top: 2%; }
    60%  { left: 55%; top: 4%; }
    70%  { left: 45%; top: 6%; }
    80%  { left: 55%; top: 8%; }
    90%  { left: 45%; top: 6%; }
    100% { left: 60%; top: 2%; }
    }
    @keyframes movepoupee {
    0%   { left: 74%; top: 72.5%; }
    1%   { left: 74%; top: 70%; }/* pause départ */
    2%   { left: 74%; top: 72.5%; }
    20%  { left: 70%; top: 72.5%; }
    21%  { left: 70%; top: 70%; }
    22%  { left: 70%; top: 72.5%; }   /* pause arrivée */
    46%  { left: 60%; top: 72.5%; }
    47%  { left: 60%; top: 70%; }
    48%  { left: 60%; top: 72.5%; }
    65%  { left: 68%; top: 72.5%; }
    66%  { left: 69%; top: 70%; }
    67%  { left: 69%; top: 72.5%; }
    79%  { left: 55%; top: 72.5%; }
    80%  { left: 55%; top: 70%; }
    81%  { left: 55%; top: 72.5%; }
    100% { left: 74%; top: 72.5%; }
    }
    @keyframes movesoleil {
    0%   { left: 60%; top: 1%; }
    10%  { left: 70%; top: 3%; }
    30%  { left: 89%; top: 10%; }
    50%  { left: 70%; top: 3%; }
    60%  { left: 60%; top: 1%; }
    80%  { left: 45%; top: 7%; }
    100% { left: 60%; top: 1%; }
    }
    @keyframes nice {
    0% {
    box-shadow: 0 0 0 1px red;
    }
    50% {
    box-shadow: 0 0 14px 3px rgba(255,0,0,0.9);
    }
    100% {
    box-shadow: 0 0 0 1px red;
    }
    }
